name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y enum34 2>$null; $true
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller hushtype.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hushtype-exe
          path: dist/hushtype.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hushtype.exe
          generate_release_notes: false
          body: |
            ## hushtype ${{ github.ref_name }} — Real-time Voice Dictation for Windows

            GPU-accelerated speech-to-text powered by OpenAI Whisper with 40+ voice commands.

            ### Download

            - **`hushtype.exe`** — Standalone Windows executable. No Python or setup required.

            On first run, Whisper will download the model (~1.5 GB). This is a one-time download.

            ### Requirements

            - Windows 10/11
            - NVIDIA GPU with CUDA support

            See the [README](https://github.com/turqoisehex/hushtype#readme) for full documentation.
